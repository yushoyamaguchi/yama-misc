name: ecmp_static_v6

topology:
  nodes:
    client:
      kind: linux
      image: nicolaka/netshoot:latest
      exec:
        - ip -6 addr add fd00:1::2/126 dev eth1
        - ip -6 addr add fd00:2::2/126 dev eth2
        - ip link set eth1 up
        - ip link set eth2 up

    gw1:
      kind: linux
      image: nicolaka/netshoot:latest
      exec:
        - sysctl -w net.ipv6.conf.all.forwarding=1
        - ip -6 addr add fd00:1::1/126 dev eth1
        - ip -6 addr add fd00:3::1/126 dev eth2
        - ip link set eth1 up
        - ip link set eth2 up
        - ip -6 route add 2001:db8::1/128 via fd00:3::2 dev eth2

    gw2:
      kind: linux
      image: nicolaka/netshoot:latest
      exec:
        - sysctl -w net.ipv6.conf.all.forwarding=1
        - ip -6 addr add fd00:2::1/126 dev eth1
        - ip -6 addr add fd00:4::1/126 dev eth2
        - ip link set eth1 up
        - ip link set eth2 up
        - ip -6 route add 2001:db8::1/128 via fd00:4::2 dev eth2

    internet:
      kind: linux
      image: nicolaka/netshoot:latest
      exec:
        - ip -6 addr add fd00:3::2/126 dev eth1
        - ip -6 addr add fd00:4::2/126 dev eth2
        - ip -6 addr add 2001:db8::1/128 dev lo
        - ip link set eth1 up
        - ip link set eth2 up
        - ip link set lo up
        - ip -6 route add fd00:1::/126 via fd00:3::1 dev eth1
        - ip -6 route add fd00:2::/126 via fd00:4::1 dev eth2

  links:
    - endpoints: ["client:eth1", "gw1:eth1"]
    - endpoints: ["client:eth2", "gw2:eth1"]
    - endpoints: ["gw1:eth2", "internet:eth1"]
    - endpoints: ["gw2:eth2", "internet:eth2"]
