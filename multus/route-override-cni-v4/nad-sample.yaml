apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: br-ecmp-ipvlan
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "plugins": [
        {
          "type": "ipvlan",
          "master": "br-ecmp",
          "mode": "l2",
          "ipam": {
            "type": "static",
            "addresses": [
              {
                "address": "192.168.100.5/24",
                "gateway": "192.168.100.1"
              }
            ]
          }
        },
        {
          "type": "route-override",
          "addroutes": [
            {"dst": "10.200.0.0/24", "gw": "192.168.100.1"}
          ]
        }
      ]
    }
